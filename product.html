object-fit: cover;  /* object-fit 适配方式；cover 覆盖裁剪（图片不变形填满） */

.modal {
  display: none;          /* 一开始隐藏 */
  position: fixed;        /* 固定在屏幕上 */
  top: 0;                 /* 贴到顶部 */
  left: 0;                /* 贴到左边 */
  width: 100%;            /* 宽度铺满全屏 */
  height: 100%;           /* 高度铺满全屏 */
  background: rgba(0,0,0,0.5); /* 半透明黑色背景 */
  z-index: 9999;          /* 放在最上层，不被挡住 */
}
.modal-content {
  background: #fff;           /* 背景：白色 */
  width: 300px;               /* 宽度：300像素 */
  padding: 30px;              /* 内边距：30像素 */

  left: 50%;                  /* 距离左侧：50% */
  transform: translate(-50%, -50%);  /* 位移：向左向上各回退50%，实现真正居中 */
}
.close-btn {

    <script>
// 点击图片放大查看
function openImage(src) {
  let lightbox = document.createElement("div");
  lightbox.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:flex;justify-content:center;align-items:center;";
  lightbox.onclick = function(){ lightbox.remove() };

  let img = document.createElement("img");
  img.src = src;
  img.style.cssText = "width:auto;height:100vh;object-fit:contain;";

  lightbox.appendChild(img);
  document.body.appendChild(lightbox);
}
function openModal() {
  document.getElementById('orderModal').style.display = 'block';
}
function closeModal() {
  document.getElementById('orderModal').style.display = 'none';
}
//下单弹窗
let currentProduct = "";//c当前 /p产品 /“”空字符串
let currentPrice = 0;//pe价格

function showModal(productName, productPrice) {//s显示 /m弹窗 /p产品 /N名称 /pe价格
   //挡住未注册就购买
  if (!localStorage.getItem("loginUser")) {//i如果 ！没有.不.非 /lS浏览器本地存储 /g获取.取出 /I项.数据 /（"lo登录用户信息
  alert("请先登录再购买！");//a弹出提示框
  location.href = "login.html";//lt当前网页地址 h链接.跳转 /l登录 /h页面
  return;//r返回.停止执行
}
  currentProduct = productName;//c当前 /p产品 = p产品 /N名称
  currentPrice = productPrice;//c当前 /pe价格 = /p产品 /pc价格
  // 把产品名显示在弹窗里
  document.getElementById("currentBuyProduct").textContent = "您正在购买：" + productName + " ¥" + productPrice + ".00";//cbp当前购买商品 /t文字内容 /+连接.拼接 /pN商品名称 /pN商品价格
  document.getElementById("orderModal").style.display = "block";//o订单弹窗 /d显示方式 /b块级.显示出来
}
function submitOrder() {//改订单邮箱接口   //s提交 /O订单  /（）备注
  let name = document.getElementById("buyName").value.trim();//值 /t（）去除首尾
  let phone = document.getElementById("buyPhone").value.trim();
  let address = document.getElementById("buyAddress").value.trim();
  if (!name || !phone || !address) { //i如果 /！非.没有.为空 /||或者
    alert("请填写完整信息");//a弹窗提示框
    return;//返回.停止
  }

  let count = document.getElementById('buyCount').value * 1;//c数量.计数.个数 /v值 输入框里的内容 /*乘号 /1数字1
  let order = {//o订单
    name: name,//n姓名
    phone: phone,//p电话
    address: address,//a地址
    product: currentProduct,//c当前的 /p产品
    price: currentPrice,//pc价格
    count: count,//c数量
    time: new Date().toLocaleString(),//t时间 /n新的 /D日期 /（）执行.调用 /t转换为 /l本地.当地/S字符串.文本
    total: (currentPrice * count).toFixed(2),//t总计.总价 /c当前 /p价格 /*乘 /c数量 /t保留小数.固定位数 /2保留2位小数
    status:"待付款"  //新增：下单默认待付款 /s状态
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];//o订单列表.所有订单 /J把字符串转成数组.对象 /l浏览器本地存储 /获取数据 /名叫orders的数据 /【】空数据
  orders.push(order);//p添加.放进
  localStorage.setItem("orders", JSON.stringify(orders));//s保存数据 /J转成可保存的字符串

  // ======================传送qq邮箱
  // ✅ 最终版：自动发邮件到你QQ邮箱
  // ======================
  let yourEmail = "1736416201@qq.com"; // 你自己的邮箱
  let mailSubject = `【新订单】${order.product} x${order.count}件`;
  let mailBody = `
您收到一个新订单！
------------------------
产品名称：${order.product}
单价：¥${order.price}.00
数量：${order.count}件
小计：¥${order.total}
------------------------
客户姓名：${order.name}
联系电话：${order.phone}
收货地址：${order.address}
下单时间：${order.time}
  `;

  // 直接唤起邮箱发送
  window.open(`mailto:${yourEmail}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`);

  alert("下单成功！订单已发到您的邮箱。");
  closeModal();
}
// 显示登录状态  //注册登录链接
function showLoginStatus() {//f定义函数.功能 /s显示 /L登录 /S状态
  let user = localStorage.getItem("loginUser");//l定义.创建 /u用户名（变量） /l浏览器本地存储 /g取出.获取 /l名字叫（"lo的数据
  let info = document.getElementById("loginInfo");//i信息.提示文字 /d网页文档 /gd通过id查找元素 /l ID叫（"lo的标签
  if (user) {//i如果 /u用户名存在
    info.innerHTML = `欢迎，${user} <a href="javascript:logout()" style="color:#ff0;">退出</a>`;//i刚才找到的.显示信息盒子 /i往盒子里写入HTML内容 /`反引号,包裹一段文字+代码 /${插入登录的用户名（变量）/ht（）点击后执行退出函数 /c颜色 /#黄色
  } else {//e否则.如果不满足上面的条件
    info.innerHTML = `<a href="login.html" style="color:#fff;">登录</a> | <a href="register.html" style="color:#fff;">注册</a>`;//f显示信息的盒子 /i写入HTML内容 /`包裹内容+字段代码 /hl跳转到登录页面的链接 /c颜色 /#f白色 /|竖线.分隔符号 /hl跳转到注册页面的链接
  }
}

// 退出登录
function logout() {//lo退出登录 /（l注销 /o退出
  localStorage.removeItem("loginUser");//lS浏览器本地存储 /r删除 /I数据 /（"lo名为lo的数据
  alert("已退出登录");//a弹出提示框
  location.reload();//l当前网页 /r（）刷新.重新加载
}

// 页面加载就执行
window.onload = function() {//w浏览器窗口.整个网页 /o加载完成时 /f（）诺名函数.要执行的代码
  showLoginStatus();//s显示 /l登录 /S状态 /（）执行.调用
}

//商品筛选  3
const cateBtns = document.querySelectorAll('.cate-btn');
//c常量 /ca分类（category缩写）/B按钮（按钮 缩写）/d网页文档 /qSA查询选择全部元素/cb类名为的元素
// 只选中商品容器内的图片，绝对不影响页面其他元素 
const goodsImgs = document.querySelectorAll('#goodsContainer .product-item');
//c常量 /g商品 /I图片（ima缩写）/d网页文档 /qSA查询所有.选中全部 /#gid名 /i图片标签 /[d id名

cateBtns.forEach(btn => {//c分类 /B按钮 /f遍历 /E挨个循环 /b单个按钮
  btn.addEventListener('click', function() {//aLR添加事件监听 /c点击 /f函数.执行代码
    // 切换按钮高亮
    cateBtns.forEach(b => b.classList.remove('active'));
    //c分类 /B按钮 /f遍历E挨个循环 /b每一个按钮（简写）/b按钮 /c类名列表 /r删除.移除 /a激活.高亮样式
    this.classList.add('active');//t当前点击的这个按钮 /c类名列表 /ad添加 /a激活.高亮样式

    // 获取当前选中的分类
    const selectFilter = this.getAttribute('data-filter');//c常量 /s选择.选中 /F筛选.过漉 /t当前点击的按钮 /gt获取属性 /df自定义的筛选属性


    // 只遍历商品容器内的图片，其他元素完全不受影响
   goodsImgs.forEach(item => {
  if (selectFilter === 'all' || item.dataset.cate === selectFilter) {
    item.style.display = 'inline-block';   // 这里！
  } else {
    item.style.display = 'none';           // 这里！
  }
});
  });
});
function addToCart(name, price, cate) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let has = cart.find(item => item.name == name);
  if (has) {
    has.count++;
  } else {
    // 新增cate字段，把分类存进去
    cart.push({ name: name, price: price, count: 1, cate: cate });
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("已加入购物车");
}
  // 购物车分类搜索功能 5
function searchGoods() {
  let inputRaw = document.getElementById('searchInput').value.trim().toLowerCase();
  const goodsItems = document.querySelectorAll('#goodsContainer .product-item');

  if (!inputRaw) {
    goodsItems.forEach(item => item.style.display = 'inline-block');
    return;
  }
  const keys = inputRaw.split(/\s+/).filter(k=>k);

  goodsItems.forEach(item => {
    const name = item.dataset.name.toLowerCase();
    const isMatch = keys.some(key => name.includes(key));
    if (isMatch){
      item.style.display = 'inline-block';
    } else {
      item.style.display = 'none';
    }
  });
}

// 支持回车搜索
document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    searchGoods();
  }
});
